name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create production env file
        run: |
          cat > .env.production <<EOF
          FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_WEB_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_WEB_MESSAGING_SENDER_ID }}
          FIREBASE_WEB_PROJECT_ID=${{ secrets.FIREBASE_WEB_PROJECT_ID }}
          FIREBASE_WEB_AUTH_DOMAIN=${{ secrets.FIREBASE_WEB_AUTH_DOMAIN }}
          FIREBASE_WEB_STORAGE_BUCKET=${{ secrets.FIREBASE_WEB_STORAGE_BUCKET }}
          FIREBASE_WEB_MEASUREMENT_ID=${{ secrets.FIREBASE_WEB_MEASUREMENT_ID }}
          FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_ANDROID_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_ANDROID_MESSAGING_SENDER_ID }}
          FIREBASE_ANDROID_PROJECT_ID=${{ secrets.FIREBASE_ANDROID_PROJECT_ID }}
          FIREBASE_ANDROID_STORAGE_BUCKET=${{ secrets.FIREBASE_ANDROID_STORAGE_BUCKET }}
          EOF

      - name: Create web Firebase config file
        run: |
          cat > web/firebase-config.local.js <<EOF
          self.FIREBASE_WEB_CONFIG = {
            apiKey: '${{ secrets.FIREBASE_WEB_API_KEY }}',
            appId: '${{ secrets.FIREBASE_WEB_APP_ID }}',
            messagingSenderId: '${{ secrets.FIREBASE_WEB_MESSAGING_SENDER_ID }}',
            projectId: '${{ secrets.FIREBASE_WEB_PROJECT_ID }}',
            authDomain: '${{ secrets.FIREBASE_WEB_AUTH_DOMAIN }}',
            storageBucket: '${{ secrets.FIREBASE_WEB_STORAGE_BUCKET }}',
            measurementId: '${{ secrets.FIREBASE_WEB_MEASUREMENT_ID }}',
          };
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define-from-file=.env.production --base-href /Study-Early/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
